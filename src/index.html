<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jesus Palmero Arrabal">
    <link rel="stylesheet" href="css/styles.css">
    <title>GameDex</title>

</head>

<body class="cuerpo">

    <header class="cabecera">

        <h1>GameDex</h1>
        <p>Tu catalogo de videojuegos</p>

    </header>

    <nav class="navegador">

        <ol class="navegador-lista">

            <ul class="elementos-lista"><a href="index.html" class="enlace-lista">Inicio</a></ul>
            <ul class="elementos-lista"><a href="pages/sobre-nosotros.html" class="enlace-lista">Sobre nosotros</a></ul>

        </ol>
    </nav>

    <main class="principal">

        <h2>Catalogo de juegos</h2>
        <div id="lista-juegos"></div>

        <div class="formulario-añadir">
            <h3>Añadir juego</h3>
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="genero" placeholder="Genero">
            <input type="text" id="plataforma" placeholder="Plataforma">
            <input type="number" id="anio" placeholder="Año">
            <input type="text" id="descripcion" placeholder="Descripcion">
            <button id="btn-añadir">Añadir</button>
        </div>

    </main>

    <footer class="pie">

        <p>GameDex - Jesus Palmero Arrabal</p>

    </footer>

    <script src="js/javascript.js"></script>

</body>

</html>
